<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple View Old Manali | Best Peaceful Guesthouse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .heading-font { font-family: 'Playfair Display', sans-serif; }
        .hero-video { width: 100%; height: auto; display: block; object-fit: contain; background: #fff; }
    </style>
</head>
<body class="antialiased">

    <!-- NAVBAR -->
    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-red-600 rounded-2xl flex items-center justify-center text-3xl text-white">🍎</div>
                <div>
                    <span class="heading-font text-3xl font-bold">Apple View</span>
                    <p class="text-xs text-red-600 -mt-1">Old Manali • Peaceful Homestay</p>
                </div>
            </div>
            <div class="hidden md:flex gap-8 text-sm font-medium">
                <a href="#about" class="hover:text-red-600">About</a>
                <a href="#rooms" class="hover:text-red-600">Rooms</a>
                <a href="#contact" class="hover:text-red-600 font-semibold">Book Now</a>
            </div>
        </div>
    </nav>

    <!-- HERO VIDEO - FIXED PATH -->
    <section class="relative bg-white overflow-hidden">
        <video id="hero-video" autoplay loop muted playsinline class="hero-video">
            <source src="./videos/old-manali-best-guesthouse-hero-video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <div class="absolute inset-0 flex flex-col items-center justify-center text-center px-6 z-10">
            <div class="max-w-4xl mx-auto">
                <h1 class="heading-font text-6xl font-bold text-white drop-shadow-2xl">Peaceful Quiet Homestay in Old Manali</h1>
                <p class="text-2xl text-white mt-4">Romantic • Serene • Trekking Base</p>
            </div>
        </div>
    </section>

    <!-- ABOUT SECTION - FIXED IMAGE PATH -->
    <section id="about" class="py-20 bg-amber-50">
        <div class="max-w-7xl mx-auto px-6">
            <div class="grid md:grid-cols-12 gap-12 items-center">
                <div class="md:col-span-7">
                    <h2 class="heading-font text-5xl font-bold">Best Peaceful Guesthouse in Old Manali</h2>
                    <p class="mt-6 text-lg">Romantic getaways, quiet stays and the perfect base for Himalayan trekking.</p>
                </div>
                <div class="md:col-span-5">
                    <img src="./images/old-manali-best-guesthouse-family-homestay-apple-orchard.jpg" 
                         alt="Apple View Old Manali family homestay with apple orchard" 
                         class="rounded-3xl shadow-2xl w-full">
                </div>
            </div>
        </div>
    </section>

    <!-- ROOMS EXAMPLE -->
    <section id="rooms" class="py-20">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="heading-font text-5xl text-center font-bold mb-12">Our Rooms</h2>
            <img src="./images/old-manali-best-guesthouse-cedar-cottage-private-balcony.jpg" 
                 alt="Cedar Cottage Old Manali" 
                 class="rounded-3xl mx-auto shadow-2xl">
        </div>
    </section>

    <script>
        // Auto play video
        window.onload = function() {
            const video = document.getElementById('hero-video');
            if (video) video.play().catch(() => {});
        };
    </script>
</body>
</html>
